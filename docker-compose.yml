# ── TrueFlow Production Stack ──────────────────────────────────────────────────
# This is the shipping compose file: gateway, dashboard, postgres, redis.
# For testing, use: docker compose -f docker-compose.yml -f docker-compose.test.yml up

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    image: trueflow/gateway:latest
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      - DATABASE_URL=postgres://postgres:password@postgres:5432/trueflow
      - REDIS_URL=redis://redis:6379
      - RUST_LOG=info
      - TRUEFLOW_MASTER_KEY=000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f
      - TRUEFLOW_ADMIN_KEY=trueflow-admin-test
      - DASHBOARD_ORIGIN=http://localhost:3000
      - TRUEFLOW_ENABLE_TEST_HOOKS=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8443/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    ulimits:
      core: 0
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: trueflow/dashboard:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8443/api/v1"
      API_URL: "http://gateway:8443/api/v1"
      GATEWAY_INTERNAL_URL: "http://gateway:8443"
      TRUEFLOW_ADMIN_KEY: "trueflow-admin-test"
      DASHBOARD_SECRET: "trueflow-dashboard-dev-secret"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      NEXTAUTH_URL: "http://localhost:3000"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: trueflow
      POSTGRES_USER: postgres
      # ⚠️  DEV ONLY — override in production with a strong password
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.50
    profiles: [ "tracing" ]
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  pgdata:
  redisdata:
