# ── TrueFlow Production Stack ──────────────────────────────────────────────────
# This is the shipping compose file: gateway, dashboard, postgres, redis.
# For testing, use: docker compose -f docker-compose.yml -f docker-compose.test.yml up

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    image: trueflow/gateway:latest
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/trueflow
      - REDIS_URL=redis://redis:6379
      - RUST_LOG=info
      - TRUEFLOW_MASTER_KEY=${TRUEFLOW_MASTER_KEY:?Set TRUEFLOW_MASTER_KEY to a 64-char hex string}
      - TRUEFLOW_ADMIN_KEY=${TRUEFLOW_ADMIN_KEY:?Set TRUEFLOW_ADMIN_KEY to a strong secret}
      - DASHBOARD_ORIGIN=${DASHBOARD_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8443/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    ulimits:
      core: 0
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: trueflow/dashboard:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8443/api/v1"
      API_URL: "http://gateway:8443/api/v1"
      GATEWAY_INTERNAL_URL: "http://gateway:8443"
      TRUEFLOW_ADMIN_KEY: "${TRUEFLOW_ADMIN_KEY:?Set TRUEFLOW_ADMIN_KEY}"
      DASHBOARD_SECRET: "${DASHBOARD_SECRET:?Set DASHBOARD_SECRET to a strong secret}"
      SESSION_SECRET: "${SESSION_SECRET:?Set SESSION_SECRET to a strong secret}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: trueflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.50
    profiles: [ "tracing" ]
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    profiles: [ "nlp-pii" ]
    ports:
      - "5002:5002"
    environment:
      - DEFAULT_LANGUAGE=en
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')" ]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  pgdata:
  redisdata:
